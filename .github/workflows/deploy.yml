# Deploy to GitHub Pages (https://arrow-head-tech.github.io)
# Runs only on push to main/master; publishes the dist/ folder.

name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate
      - run: npm run build
      - uses: actions/upload-pages-artifact@3
        with:
          path: dist
      - uses: actions/deploy-pages@4
        id: deploy

permissions:
  contents: read
  pages: write
  id-token: write
